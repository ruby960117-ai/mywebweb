<!doctype html>
<html lang="zh-Hant">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Chang Yu-an (An) 的個人網站</title>
	<style>
		:root {
			--bg: #c8b9a8;
			--bg-soft: #7e6f6a;
			--paper: #f4f4f2;
			--ink: #111111;
			--muted: #555555;
			--card: #fffdf6;
			--border: #242424;
			--coffee: #6f4e37;
			--red: #8a1c1c;
			--shadow: 0 16px 30px rgba(0, 0, 0, 0.35);
		}

		* {
			box-sizing: border-box;
		}

		body {
			margin: 0;
			min-height: 100vh;
			font-family: "Noto Serif TC", "PMingLiU", serif;
			color: var(--paper);
			background:
				repeating-linear-gradient(0deg, rgba(255, 255, 255, 0.03) 0 1px, transparent 1px 3px),
				linear-gradient(160deg, var(--bg) 0%, var(--bg-soft) 100%);
			display: grid;
			place-items: center;
			padding: 24px;
		}

		.container {
			width: min(860px, 100%);
			background: linear-gradient(180deg, #f8f8f6 0%, #ecece9 100%);
			border: 2px solid var(--border);
			border-radius: 8px;
			box-shadow: var(--shadow);
			overflow: hidden;
			position: relative;
		}

		.container::after {
			content: "";
			position: absolute;
			inset: 0;
			pointer-events: none;
			background:
				radial-gradient(circle at 20% 10%, rgba(0, 0, 0, 0.05), transparent 40%),
				radial-gradient(circle at 80% 90%, rgba(0, 0, 0, 0.06), transparent 35%);
		}

		.hero {
			padding: 40px 30px 24px;
			border-bottom: 1px solid var(--border);
			position: relative;
			z-index: 1;
		}

		nav {
			display: flex;
			gap: 8px;
			flex-wrap: wrap;
			margin-top: 14px;
		}

		nav a {
			text-decoration: none;
			font-size: 0.9rem;
			padding: 6px 10px;
			border: 1px solid var(--border);
			border-radius: 2px;
			color: var(--ink);
			background: #efefeb;
		}

		nav a:hover {
			background: var(--ink);
			color: var(--paper);
		}

		h1 {
			margin: 0;
			font-size: clamp(1.7rem, 4vw, 2.5rem);
			letter-spacing: 0.04em;
			line-height: 1.25;
			color: var(--ink);
			text-transform: uppercase;
		}

		.subtitle {
			margin-top: 12px;
			color: var(--muted);
			font-size: 1.05rem;
			font-style: italic;
		}

		.content {
			display: grid;
			grid-template-columns: 1.5fr 1fr;
			gap: 24px;
			padding: 28px 30px 34px;
			position: relative;
			z-index: 1;
		}

		.card {
			border: 1px solid var(--border);
			background: var(--card);
			border-radius: 6px;
			padding: 20px;
			color: var(--ink);
		}

		h2 {
			margin: 0 0 12px;
			font-size: 1.2rem;
			color: var(--ink);
			border-bottom: 1px dashed var(--border);
			padding-bottom: 8px;
		}

		.tag {
			display: inline-block;
			font-size: 0.75rem;
			padding: 3px 8px;
			margin-bottom: 12px;
			border: 1px solid;
			letter-spacing: 0.08em;
			text-transform: uppercase;
		}

		.tag.coffee {
			color: var(--coffee);
			border-color: var(--coffee);
		}

		.tag.red {
			color: var(--red);
			border-color: var(--red);
		}

		p {
			margin: 0;
			line-height: 1.75;
			color: #222222;
		}

		.portfolio-link {
			display: inline-block;
			margin-top: 14px;
			padding: 9px 14px;
			border-radius: 3px;
			text-decoration: none;
			font-weight: 700;
			color: var(--paper);
			background: var(--red);
			border: 1px solid var(--red);
			transition: background-color 0.2s ease, color 0.2s ease;
		}

		.portfolio-link:hover {
			background: transparent;
			color: var(--red);
		}

		.footer-note {
			margin-top: 16px;
			font-size: 0.9rem;
			color: var(--muted);
		}

		.quick-links {
			margin-top: 14px;
			display: grid;
			gap: 8px;
		}

		.quick-links a {
			color: var(--coffee);
			text-decoration: none;
			border-bottom: 1px dotted var(--coffee);
			width: fit-content;
		}

		.quick-links a:hover {
			color: var(--red);
			border-bottom-color: var(--red);
		}

		@media (max-width: 720px) {
			.hero {
				padding: 30px 20px 20px;
			}

			.content {
				grid-template-columns: 1fr;
				padding: 20px;
			}
		}
	</style>
</head>
<body>
	<main class="container">
		<section class="hero">
			<h1>Chang Yu-an (An) </h1>
			<p class="subtitle">Hi，我是 An，歡迎來到我的網站！</p>
			<nav>
				<a href="index.html">首頁</a>
				<a href="about.html">關於我</a>
				<a href="portfolio.html">作品集</a>
				<a href="contact.html">聯絡我</a>
			</nav>
		</section>

		<section class="content">
			<article class="card">
				<span class="tag coffee">Coffee Notes</span>
				<h2>自我介紹</h2>
				<p>
					我喜歡把想法轉化成兼具美感與實用性的數位體驗。
					目前持續學習新技術，並透過專案累積更多實作經驗。
				</p>
				<div class="quick-links">
					<a href="about.html">閱讀我的完整介紹</a>
					<a href="portfolio.html">查看精選作品與連結</a>
				</div>
			</article>

			<aside class="card">
				<span class="tag red">Featured</span>
				<h2>我的作品集</h2>
				<p>想看更多我做過的專案與練習成果，歡迎前往作品集頁面，含外部連結入口。</p>
				<a class="portfolio-link" href="portfolio.html">
					前往作品集頁
				</a>
				<p class="footer-note">復古黑白基底，搭配咖啡與紅色作為重點點綴。</p>
			</aside>
		</section>
	</main>
</body>
</html>
